loki:
  deploymentMode: SimpleScalable
  
  commonConfig:
    replication_factor: 3

  storage:
    type: s3
    s3:
      region: eu-central-1
    bucketNames:
      chunks: loki-prod-storage-ematiq
      ruler: loki-prod-storage-ematiq
      admin: loki-prod-storage-ematiq

  serviceAccount:
    create: true
    name: loki
    annotations:
      # Replace <LOKI_IRSA_ROLE_ARN> with the output of: terraform output loki_irsa_role_arn
      eks.amazonaws.com/role-arn: <LOKI_IRSA_ROLE_ARN>

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # SENIOR FIX: Mandatory tolerations and nodeSelectors for the tainted nodes
  write:
    replicas: 3
    nodeSelector:
      role: loki-engine
    tolerations:
      - key: "loki-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
  
  read:
    replicas: 3
    nodeSelector:
      role: loki-engine
    tolerations:
      - key: "loki-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
  
  backend:
    replicas: 3
    nodeSelector:
      role: loki-engine
    tolerations:
      - key: "loki-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi

# Disable the nested Grafana to avoid confusion and use the standalone one
grafana:
  enabled: false
